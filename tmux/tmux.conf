# Minimal tmux config for multi-repo / multi-branch work.

set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*:Tc"

set -g extended-keys on
set -g extended-keys-format csi-u

set -g mouse on
set -g history-limit 100000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g focus-events on
set -g set-clipboard on
set -g status-interval 5
set -g status-justify left
set -g status-left-length 40
set -g status-right-length 80
set -g automatic-rename on
setw -g automatic-rename on

setw -g mode-keys vi
set -g status-keys vi

set -g display-panes-time 1500
set -g escape-time 10

set -g status-style "bg=colour236,fg=colour250"
set -g status-left-style "bg=colour238,fg=colour230,bold"
set -g status-right-style "bg=colour236,fg=colour250"
set -g window-status-current-style "fg=colour231,bold"
set -g window-status-style "fg=colour244"
set -g pane-active-border-style "fg=colour39"
set -g pane-border-style "fg=colour238"

set -g status-left " #S "
set -g status-right "#(whoami)@#H %Y-%m-%d %H:%M "

bind r source-file ~/.tmux.conf \; display-message 'reloaded ~/.tmux.conf'
bind c new-window -c '#{pane_current_path}'
bind | split-window -h -c '#{pane_current_path}'
bind - split-window -v -c '#{pane_current_path}'
bind m resize-pane -Z
bind Space last-window
bind Tab last-pane

unbind '"'
unbind '%'

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send -X cancel
